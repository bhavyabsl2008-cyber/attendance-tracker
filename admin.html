<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presynce — Suggestions Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #0f0f23; color: #f0f0ee; margin: 0; padding: 40px 20px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 22px; margin-bottom: 24px; }
  .locked, .loading { color: rgba(240,240,238,0.6); padding: 60px 0; text-align: center; }
  .locked button { margin-top: 16px; padding: 10px 20px; background: #4f8ef7; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
  .item { background: #17172a; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; }
  .item-text { font-size: 14px; line-height: 1.6; margin-bottom: 10px; white-space: pre-wrap; }
  .item-meta { font-size: 11px; font-family: 'DM Mono', monospace; color: rgba(240,240,238,0.4); display: flex; gap: 14px; flex-wrap: wrap; }
  .empty { color: rgba(240,240,238,0.4); text-align: center; padding: 40px 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Suggestions — Admin</h1>
  <div id="content" class="loading">Loading…</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
  // Only this Google account may view submitted suggestions. Everyone else,
  // signed in or not, sees a sign-in prompt and nothing further — the Firestore
  // rule (read: if false) blocks reads from anyone but this client-side check
  // too, so a wrong account can't even attempt the read.
  const ADMIN_EMAIL = 'bhavya.bsl2008@gmail.com';

  const content = document.getElementById('content');

  function showLocked(afterSignIn) {
    content.className = 'locked';
    content.innerHTML = afterSignIn
      ? 'This account isn\'t authorized to view suggestions.'
      : 'Sign in with the admin Google account to view suggestions.<br><button id="admin-signin">Sign in with Google</button>';
    const btn = document.getElementById('admin-signin');
    if (btn) btn.addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      firebase.auth().signInWithPopup(provider).catch(err => console.error(err));
    });
  }

  async function loadSuggestions() {
    content.className = 'loading';
    content.textContent = 'Loading…';
    const db = firebase.firestore();
    try {
      const snap = await db.collection('suggestions').orderBy('createdAt', 'desc').get();
      if (snap.empty) {
        content.className = 'empty';
        content.textContent = 'No suggestions yet.';
        return;
      }
      content.className = '';
      content.innerHTML = '';
      snap.forEach(doc => {
        const d = doc.data();
        const when = d.createdAt ? d.createdAt.toDate().toLocaleString() : 'just now';
        const el = document.createElement('div');
        el.className = 'item';
        el.innerHTML = `
          <div class="item-text"></div>
          <div class="item-meta">
            <span>${when}</span>
            <span>${d.batch || 'no batch set'}</span>
            <span>${d.userEmail || 'anonymous'}</span>
          </div>`;
        el.querySelector('.item-text').textContent = d.text || '';
        content.appendChild(el);
      });
    } catch (err) {
      content.className = 'locked';
      content.textContent = "Couldn't load — check you're signed in with the admin account.";
      console.error(err);
    }
  }

  firebase.auth().onAuthStateChanged(user => {
    if (user && user.email === ADMIN_EMAIL) {
      loadSuggestions();
    } else if (user) {
      showLocked(true);
    } else {
      showLocked(false);
    }
  });
</script>
</body>
</html>
